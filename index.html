<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<meta name="theme-color" content="#5856D6">
<link rel="manifest" href="manifest.json">
<title>记账本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F2F2F7;--card:#fff;--text:#1C1C1E;--sub:#8E8E93;--accent:#5856D6;--green:#34C759;--red:#FF3B30;--border:#E5E5EA;--radius:14px;--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;padding-top:var(--safe-top);padding-bottom:calc(65px + var(--safe-bottom));min-height:100vh}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:0.5px solid var(--border);padding-bottom:var(--safe-bottom);z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;font-size:10px;color:var(--sub);cursor:pointer;transition:color .2s}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:24px;height:24px;margin-bottom:2px}
.page{display:none;padding:16px}.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.amount-input{font-size:44px;font-weight:700;width:100%;border:none;background:transparent;text-align:center;outline:none;color:var(--text)}
.amount-input::placeholder{color:#ccc}
.type-toggle{display:flex;gap:8px}
.type-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.type-btn.active-exp{border-color:var(--red);color:var(--red);background:#FFF5F5}
.type-btn.active-inc{border-color:var(--green);color:var(--green);background:#F0FFF4}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-btn{padding:10px 4px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:12px;cursor:pointer;transition:all .2s;text-align:center}
.cat-btn.sel{border-color:var(--accent);background:#EDEDFC}
.cat-emoji{font-size:26px;display:block;margin-bottom:2px}
input[type="text"],input[type="date"]{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;background:var(--card)}
input:focus{border-color:var(--accent)}
.save-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:17px;font-weight:600;cursor:pointer;transition:opacity .2s}
.save-btn:active{opacity:.7}.save-btn:disabled{opacity:.4}
.summary-row{display:flex;gap:12px}
.summary-item{flex:1;text-align:center}
.summary-label{font-size:12px;color:var(--sub);margin-bottom:4px}
.summary-value{font-size:20px;font-weight:700}
.income{color:var(--green)}.expense{color:var(--red)}
.filter-bar{display:flex;gap:8px;margin-bottom:12px}
.filter-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:var(--accent);background:#EDEDFC;color:var(--accent)}
.search-box{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--card);margin-bottom:12px}
.txn-date{font-size:13px;font-weight:600;color:var(--sub);padding:8px 0 4px}
.txn-item{display:flex;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border)}
.txn-item:last-child{border-bottom:none}
.txn-icon{width:42px;height:42px;border-radius:50%;background:#F2F2F7;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.txn-info{flex:1;margin-left:12px}
.txn-cat{font-size:15px;font-weight:500}
.txn-note{font-size:12px;color:var(--sub);margin-top:2px}
.txn-amount{font-size:16px;font-weight:600;text-align:right}
.txn-del{width:32px;height:32px;border:none;background:#FEE2E2;border-radius:8px;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;opacity:0;transition:opacity .2s}
.txn-item:active .txn-del{opacity:1}
.chart-row{display:flex;align-items:flex-end;height:140px;gap:4px;padding:0 8px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.chart-bars{display:flex;gap:2px;align-items:flex-end;height:110px}
.bar{width:14px;border-radius:4px 4px 0 0;min-height:2px}
.bar.inc{background:var(--green)}.bar.exp{background:var(--red)}
.chart-label{font-size:10px;color:var(--sub)}
.legend{display:flex;gap:16px;justify-content:center;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--sub)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.rank-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rank-label{font-size:13px;width:48px;text-align:right;flex-shrink:0}
.rank-track{flex:1;height:8px;background:#F2F2F7;border-radius:4px;overflow:hidden}
.rank-fill{height:100%;border-radius:4px;transition:width .4s}
.rank-val{font-size:13px;font-weight:600;width:60px;text-align:right;flex-shrink:0}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#fff;padding:12px 24px;border-radius:25px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 0;color:var(--sub)}
.empty-icon{font-size:48px;margin-bottom:12px}
.form-label{font-size:14px;font-weight:600;margin-bottom:8px;display:block}
.setting-btn{width:100%;padding:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;margin-top:8px}
.setting-btn:active{background:#F2F2F7}
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:360px}
.setup-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:16px}
.setup-desc{font-size:14px;color:var(--sub);text-align:center;margin-bottom:16px;line-height:1.5}
.setup-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;margin-bottom:12px}
.setup-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.setup-btn:active{opacity:.7}
.sync-indicator{position:fixed;top:calc(var(--safe-top) + 4px);right:12px;font-size:10px;color:var(--sub);z-index:50}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="sync-indicator" id="syncStatus"></div>

<!-- Setup Overlay -->
<div class="setup-overlay" id="setupOverlay" style="display:none">
  <div class="setup-card">
    <div class="setup-title">设置 GitHub 同步</div>
    <div class="setup-desc">输入你的 GitHub Token，数据将保存在你的 GitHub 仓库中，多设备同步不丢失。</div>
    <input type="text" class="setup-input" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <button class="setup-btn" onclick="saveSetup()">确认</button>
  </div>
</div>

<!-- Pages -->
<div id="page-add" class="page active">
  <div class="card">
    <input type="text" class="amount-input" id="amount" placeholder="0.00" inputmode="decimal">
  </div>
  <div class="card">
    <div class="form-label">类型</div>
    <div class="type-toggle">
      <button class="type-btn active-exp" data-type="expense" onclick="setType('expense')">📤 支出</button>
      <button class="type-btn" data-type="income" onclick="setType('income')">📥 收入</button>
    </div>
  </div>
  <div class="card">
    <div class="form-label">分类</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>
  <div class="card">
    <div class="form-label">备注</div>
    <input type="text" id="note" placeholder="添加备注（可选）">
    <div class="form-label" style="margin-top:12px">日期</div>
    <input type="date" id="txDate">
  </div>
  <button class="save-btn" id="saveBtn" onclick="saveTransaction()">保存</button>
</div>

<div id="page-list" class="page">
  <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索备注或分类...">
  <div class="filter-bar">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-f="expense" onclick="setFilter('expense')">支出</button>
    <button class="filter-btn" data-f="income" onclick="setFilter('income')">收入</button>
  </div>
  <div class="card">
    <div class="summary-row">
      <div class="summary-item"><div class="summary-label">今日收入</div><div class="summary-value income" id="tIncome">0</div></div>
      <div class="summary-item"><div class="summary-label">今日支出</div><div class="summary-value expense" id="tExpense">0</div></div>
      <div class="summary-item"><div class="summary-label">结余</div><div class="summary-value" id="tBalance">0</div></div>
    </div>
  </div>
  <div id="txnList"></div>
</div>

<div id="page-stats" class="page">
  <div class="card">
    <div class="form-label">本月收支</div>
    <div class="summary-row" style="margin-top:8px">
      <div class="summary-item"><div class="summary-label">收入</div><div class="summary-value income" id="mIncome">0</div></div>
      <div class="summary-item"><div class="summary-label">支出</div><div class="summary-value expense" id="mExpense">0</div></div>
      <div class="summary-item"><div class="summary-label">结余</div><div class="summary-value" id="mBalance">0</div></div>
    </div>
  </div>
  <div class="card">
    <div class="form-label">最近7天</div>
    <div class="chart-row" id="weekChart"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>收入</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>支出</div>
    </div>
  </div>
  <div class="card">
    <div class="form-label">本月支出分类</div>
    <div id="catRanking"></div>
  </div>
</div>

<div id="page-settings" class="page">
  <div class="card">
    <div class="form-label">数据同步</div>
    <p style="font-size:13px;color:var(--sub);margin-bottom:8px" id="syncInfo">正在检查...</p>
    <button class="setting-btn" onclick="manualSync()">🔄 手动同步</button>
    <button class="setting-btn" onclick="changeToken()">🔑 修改 Token</button>
  </div>
  <div class="card">
    <div class="form-label">数据管理</div>
    <button class="setting-btn" onclick="exportCSV()">📄 导出 CSV</button>
    <button class="setting-btn" onclick="clearAll()" style="color:var(--red)">🗑️ 清空所有数据</button>
  </div>
  <div class="card">
    <div class="form-label">快捷指令</div>
    <p style="font-size:13px;color:var(--sub);line-height:1.6">
      在 iPhone 快捷指令 App中创建：<br><br>
      <b>URL：</b><br>
      <code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:12px" id="shortcutUrl">加载中...</code><br><br>
      <b>操作：</b>添加「URL」+「打开 URL」<br>
      <b>Siri：</b>说"记账"触发
    </p>
  </div>
  <div class="card" style="text-align:center">
    <p style="font-size:12px;color:var(--sub)">记账本 v2.0 · GitHub 同步版</p>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
    <span>记账</span>
  </div>
  <div class="tab-item" onclick="switchTab('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
    <span>账单</span>
  </div>
  <div class="tab-item" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M12 3a9 9 0 019 9H12V3z"/></svg>
    <span>统计</span>
  </div>
  <div class="tab-item" onclick="switchTab('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <span>设置</span>
  </div>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
let GH_TOKEN = localStorage.getItem('gh_token') || '';
const GH_OWNER = 'ycy305342363-lgtm';
const GH_REPO = '-';
const DATA_FILE = 'data.json';
const API_BASE = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${DATA_FILE}`;

// ============================================================
//  GITHUB STORAGE
// ============================================================
let dataSha = null; // For optimistic concurrency
let localData = [];
let syncing = false;

async function fetchFromGitHub() {
  try {
    const res = await fetch(API_BASE, {
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) {
      localData = [];
      dataSha = null;
      return;
    }
    if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
    const json = await res.json();
    dataSha = json.sha;
    localData = JSON.parse(atob(json.content));
  } catch (e) {
    console.error('Fetch error:', e);
    // Fallback to localStorage
    const cached = localStorage.getItem('bookkeeping_cache');
    if (cached) localData = JSON.parse(cached);
  }
}

async function pushToGitHub() {
  try {
    syncing = true;
    updateSyncStatus();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(localData))));
    const body = { message: 'update data', content };
    if (dataSha) body.sha = dataSha;
    const res = await fetch(API_BASE, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
    const json = await res.json();
    dataSha = json.content.sha;
    localStorage.setItem('bookkeeping_cache', JSON.stringify(localData));
    syncing = false;
    updateSyncStatus();
  } catch (e) {
    console.error('Push error:', e);
    syncing = false;
    updateSyncStatus();
    showToast('⚠️ 同步失败，已保存到本地');
    localStorage.setItem('bookkeeping_cache', JSON.stringify(localData));
  }
}

function updateSyncStatus() {
  const el = document.getElementById('syncStatus');
  el.textContent = syncing ? '⟳ 同步中...' : '✓ 已同步';
  setTimeout(() => { if (!syncing) el.textContent = ''; }, 2000);
}

// ============================================================
//  CATEGORIES
// ============================================================
const CATS = {
  expense: [
    {id:'food',emoji:'🍜',name:'餐饮'},{id:'transport',emoji:'🚗',name:'交通'},
    {id:'shopping',emoji:'🛒',name:'购物'},{id:'entertainment',emoji:'🎮',name:'娱乐'},
    {id:'housing',emoji:'🏠',name:'住房'},{id:'medical',emoji:'💊',name:'医疗'},
    {id:'education',emoji:'📚',name:'教育'},{id:'other',emoji:'📌',name:'其他'},
  ],
  income: [
    {id:'salary',emoji:'💰',name:'工资'},{id:'bonus',emoji:'🎁',name:'奖金'},
    {id:'investment',emoji:'📈',name:'投资'},{id:'freelance',emoji:'💼',name:'兼职'},
    {id:'other',emoji:'📌',name:'其他'},
  ]
};

// ============================================================
//  STATE
// ============================================================
let curType = 'expense', curCat = 'food', curFilter = 'all';

// ============================================================
//  TAB
// ============================================================
function switchTab(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.querySelectorAll('.tab-item')[['add','list','stats','settings'].indexOf(n)].classList.add('active');
  if (n==='list') renderList();
  if (n==='stats') renderStats();
  if (n==='settings') renderSettings();
}

// ============================================================
//  ADD PAGE
// ============================================================
function setType(t) {
  curType = t; curCat = CATS[t][0].id;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.className = 'type-btn' + (b.dataset.type===t ? (t==='expense'?' active-exp':' active-inc') : '');
  });
  renderCatGrid();
}

function renderCatGrid() {
  document.getElementById('catGrid').innerHTML = CATS[curType].map(c =>
    `<button class="cat-btn${c.id===curCat?' sel':''}" onclick="selectCat('${c.id}')"><span class="cat-emoji">${c.emoji}</span>${c.name}</button>`
  ).join('');
}

function selectCat(id) { curCat = id; renderCatGrid(); }

async function saveTransaction() {
  const amount = parseFloat(document.getElementById('amount').value);
  if (!amount || amount <= 0) { showToast('请输入金额'); return; }
  const cat = CATS[curType].find(c => c.id === curCat);
  localData.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    amount, type: curType, category: curCat,
    catName: cat.name, catEmoji: cat.emoji,
    note: document.getElementById('note').value.trim(),
    date: document.getElementById('txDate').value || new Date().toISOString().slice(0,10),
    ts: Date.now()
  });
  await pushToGitHub();
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  showToast('✅ 已记录');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ============================================================
//  LIST PAGE
// ============================================================
function setFilter(f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f===f));
  renderList();
}

function renderList() {
  const today = new Date().toISOString().slice(0,10);
  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  const todayTxns = localData.filter(t => t.date===today);
  const tInc = todayTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const tExp = todayTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('tIncome').textContent = '¥'+tInc.toFixed(2);
  document.getElementById('tExpense').textContent = '¥'+tExp.toFixed(2);
  const bal = tInc - tExp;
  const balEl = document.getElementById('tBalance');
  balEl.textContent = '¥'+bal.toFixed(2);
  balEl.className = 'summary-value '+(bal>=0?'income':'expense');

  let filtered = localData.slice().sort((a,b)=>b.ts-a.ts);
  if (curFilter!=='all') filtered = filtered.filter(t=>t.type===curFilter);
  if (search) filtered = filtered.filter(t => (t.note&&t.note.toLowerCase().includes(search)) || t.catName.toLowerCase().includes(search));

  const grouped = {};
  filtered.forEach(t => { if(!grouped[t.date]) grouped[t.date]=[]; grouped[t.date].push(t); });
  const sections = Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a));

  const container = document.getElementById('txnList');
  if (!filtered.length) { container.innerHTML='<div class="empty"><div class="empty-icon">📝</div>暂无记录</div>'; return; }

  let html = '';
  for (const [date, items] of sections) {
    html += `<div class="card"><div class="txn-date">${fmtDate(date)}</div>`;
    items.forEach(t => {
      html += `<div class="txn-item"><div class="txn-icon">${t.catEmoji}</div><div class="txn-info"><div class="txn-cat">${t.catName}</div>${t.note?`<div class="txn-note">${esc(t.note)}</div>`:''}</div><div class="txn-amount ${t.type}">${t.type==='expense'?'-':'+'}¥${t.amount.toFixed(2)}</div><button class="txn-del" onclick="delTxn('${t.id}')">✕</button></div>`;
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

async function delTxn(id) {
  if (!confirm('确定删除？')) return;
  localData = localData.filter(t => t.id !== id);
  await pushToGitHub();
  renderList();
  showToast('已删除');
}

function fmtDate(d) {
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (d===today) return '今天';
  if (d===yesterday) return '昨天';
  const [y,m,dy] = d.split('-');
  return parseInt(m)+'月'+parseInt(dy)+'日';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ============================================================
//  STATS PAGE
// ============================================================
function renderStats() {
  const now = new Date();
  const monthStr = now.toISOString().slice(0,7);
  const monthTxns = localData.filter(t=>t.date.startsWith(monthStr));
  const mInc = monthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExp = monthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('mIncome').textContent='¥'+mInc.toFixed(0);
  document.getElementById('mExpense').textContent='¥'+mExp.toFixed(0);
  const mBal = mInc-mExp;
  const mBalEl = document.getElementById('mBalance');
  mBalEl.textContent='¥'+mBal.toFixed(0);
  mBalEl.className='summary-value '+(mBal>=0?'income':'expense');

  // Week chart
  const days=[], dayNames=['日','一','二','三','四','五','六'];
  let weekMax = 0;
  for (let i=6;i>=0;i--) {
    const d = new Date(Date.now()-i*86400000);
    const ds = d.toISOString().slice(0,10);
    const dt = localData.filter(t=>t.date===ds);
    const inc = dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    weekMax = Math.max(weekMax, inc, exp);
    days.push({label:i===0?'今':dayNames[d.getDay()], inc, exp});
  }
  document.getElementById('weekChart').innerHTML = days.map(d => {
    return `<div class="chart-col"><div class="chart-bars"><div class="bar inc" style="height:${weekMax?d.inc/weekMax*100:0}%"></div><div class="bar exp" style="height:${weekMax?d.exp/weekMax*100:0}%"></div></div><div class="chart-label">${d.label}</div></div>`;
  }).join('');

  // Category ranking
  const expByCat = {};
  monthTxns.filter(t=>t.type==='expense').forEach(t => {
    if(!expByCat[t.category]) expByCat[t.category]={emoji:t.catEmoji,name:t.catName,amount:0};
    expByCat[t.category].amount += t.amount;
  });
  const sorted = Object.values(expByCat).sort((a,b)=>b.amount-a.amount);
  const total = sorted.reduce((s,c)=>s+c.amount,0);
  const maxA = sorted[0]?.amount||1;
  document.getElementById('catRanking').innerHTML = sorted.length ? sorted.map(c => {
    const pct = total?c.amount/total*100:0;
    return `<div class="rank-row"><div class="rank-label">${c.emoji} ${c.name}</div><div class="rank-track"><div class="rank-fill" style="width:${c.amount/maxA*100}%;background:var(--accent)"></div></div><div class="rank-val">¥${c.amount.toFixed(0)} ${pct.toFixed(0)}%</div></div>`;
  }).join('') : '<div style="text-align:center;color:var(--sub);padding:20px">暂无支出</div>';
}

// ============================================================
//  SETTINGS PAGE
// ============================================================
function renderSettings() {
  document.getElementById('syncInfo').textContent = `GitHub 同步已开启 · 共 ${localData.length} 条记录`;
  document.getElementById('shortcutUrl').textContent = location.href.split('?')[0] + '?action=add&amount=35&category=food&note=午饭';
}

async function manualSync() {
  showToast('⟳ 同步中...');
  await fetchFromGitHub();
  showToast('✅ 同步完成');
}

function exportCSV() {
  if (!localData.length) { showToast('暂无数据'); return; }
  const sorted = [...localData].sort((a,b)=>a.date.localeCompare(b.date));
  let csv = '﻿日期,类型,分类,金额,备注\n';
  sorted.forEach(t => {
    csv += `${t.date},${t.type==='expense'?'支出':'收入'},${t.catName},${t.amount},"${(t.note||'').replace(/"/g,'""')}"\n`;
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `记账本_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('已导出 CSV');
}

function clearAll() {
  if (!confirm('确定清空所有数据？')) return;
  if (!confirm('再次确认：真的要删除全部吗？')) return;
  localData = [];
  pushToGitHub();
  showToast('已清空');
}

function changeToken() {
  document.getElementById('tokenInput').value = '';
  document.getElementById('setupOverlay').style.display = 'flex';
}

// ============================================================
//  URL SCHEME HANDLER
// ============================================================
function handleURL() {
  const params = new URLSearchParams(location.search);
  const action = params.get('action');
  if (!action) return;
  if (action==='add') {
    const amount = parseFloat(params.get('amount'));
    const catId = params.get('category')||'other';
    const note = params.get('note')||'';
    const type = params.get('type')||'expense';
    const date = params.get('date')||new Date().toISOString().slice(0,10);
    if (!amount) { showToast('⚠️ 金额无效'); return; }
    const cats = CATS[type]||CATS.expense;
    const cat = cats.find(c=>c.id===catId)||cats[cats.length-1];
    localData.push({
      id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      amount, type, category:catId, catName:cat.name, catEmoji:cat.emoji,
      note, date, ts:Date.now()
    });
    pushToGitHub();
    showToast(`✅ ${type==='income'?'收入':'支出'} ¥${amount.toFixed(2)} ${cat.emoji}${cat.name}`);
    history.replaceState(null,'',location.pathname);
  }
}

// ============================================================
//  INIT
// ============================================================
async function init() {
  document.getElementById('txDate').value = new Date().toISOString().slice(0,10);
  renderCatGrid();
  document.getElementById('searchBox').addEventListener('input', renderList);

  if (!GH_TOKEN) {
    document.getElementById('setupOverlay').style.display = 'flex';
    return;
  }

  showToast('⟳ 加载数据...');
  await fetchFromGitHub();
  showToast(`✅ 已加载 ${localData.length} 条记录`);
  handleURL();
}

function saveSetup() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { showToast('请输入 Token'); return; }
  GH_TOKEN = token;
  localStorage.setItem('gh_token', token);
  document.getElementById('setupOverlay').style.display = 'none';
  showToast('✅ 设置成功');
  init();
}

init();
</script>
